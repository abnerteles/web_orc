<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="64" fill="#2563eb"/>
  <rect x="32" y="32" width="448" height="448" rx="32" fill="#ffffff" fill-opacity="0.1"/>
  
  <!-- Building/Construction Icon -->
  <g transform="translate(128, 128)">
    <!-- Base building -->
    <rect x="60" y="160" width="136" height="96" fill="#ffffff" stroke="#e2e8f0" stroke-width="4"/>
    
    <!-- Roof -->
    <polygon points="40,160 128,80 216,160" fill="#ffffff" stroke="#e2e8f0" stroke-width="4"/>
    
    <!-- Windows -->
    <rect x="76" y="180" width="20" height="20" fill="#2563eb"/>
    <rect x="104" y="180" width="20" height="20" fill="#2563eb"/>
    <rect x="132" y="180" width="20" height="20" fill="#2563eb"/>
    <rect x="160" y="180" width="20" height="20" fill="#2563eb"/>
    
    <rect x="76" y="212" width="20" height="20" fill="#2563eb"/>
    <rect x="104" y="212" width="20" height="20" fill="#2563eb"/>
    <rect x="132" y="212" width="20" height="20" fill="#2563eb"/>
    <rect x="160" y="212" width="20" height="20" fill="#2563eb"/>
    
    <!-- Door -->
    <rect x="116" y="224" width="24" height="32" fill="#1e40af"/>
    
    <!-- Calculator/Budget symbol -->
    <rect x="12" y="60" width="64" height="80" fill="#ffffff" stroke="#e2e8f0" stroke-width="4" rx="4"/>
    
    <!-- Calculator display -->
    <rect x="20" y="72" width="48" height="16" fill="#1e293b" rx="2"/>
    <text x="44" y="84" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">123.45</text>
    
    <!-- Calculator buttons -->
    <circle cx="28" cy="104" r="4" fill="#2563eb"/>
    <circle cx="44" cy="104" r="4" fill="#2563eb"/>
    <circle cx="60" cy="104" r="4" fill="#2563eb"/>
    
    <circle cx="28" cy="120" r="4" fill="#2563eb"/>
    <circle cx="44" cy="120" r="4" fill="#2563eb"/>
    <circle cx="60" cy="120" r="4" fill="#2563eb"/>
    
    <circle cx="28" cy="136" r="4" fill="#2563eb"/>
    <circle cx="44" cy="136" r="4" fill="#2563eb"/>
    <circle cx="60" cy="136" r="4" fill="#059669"/>
    
    <!-- Money symbol -->
    <text x="224" y="80" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">R$</text>
    
    <!-- Chart/Graph -->
    <rect x="220" y="100" width="60" height="40" fill="none" stroke="#ffffff" stroke-width="2"/>
    <polyline points="224,136 232,124 240,132 248,120 256,128 264,116 272,124 276,120" stroke="#ffffff" stroke-width="3" fill="none"/>
    
    <!-- Tools -->
    <g transform="translate(200, 180)">
      <!-- Hammer -->
      <rect x="0" y="20" width="4" height="32" fill="#ffffff"/>
      <rect x="-4" y="16" width="12" height="8" fill="#ffffff"/>
      
      <!-- Ruler -->
      <rect x="16" y="20" width="32" height="4" fill="#ffffff"/>
      <rect x="16" y="18" width="2" height="8" fill="#ffffff"/>
      <rect x="24" y="20" width="2" height="4" fill="#ffffff"/>
      <rect x="32" y="18" width="2" height="8" fill="#ffffff"/>
      <rect x="40" y="20" width="2" height="4" fill="#ffffff"/>
      <rect x="46" y="18" width="2" height="8" fill="#ffffff"/>
    </g>
  </g>
  
  <!-- App name -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">ORÇAMENTOS</text>
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" opacity="0.8">Construção Civil</text>
</svg>