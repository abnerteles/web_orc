<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="192" height="192" rx="24" fill="#2563eb"/>
  <rect x="16" y="16" width="160" height="160" rx="16" fill="#ffffff" fill-opacity="0.1"/>
  
  <!-- Building/Construction Icon -->
  <g transform="translate(48, 48)">
    <!-- Base building -->
    <rect x="20" y="60" width="56" height="36" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Roof -->
    <polygon points="16,60 48,32 80,60" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Windows -->
    <rect x="28" y="68" width="8" height="8" fill="#2563eb"/>
    <rect x="40" y="68" width="8" height="8" fill="#2563eb"/>
    <rect x="52" y="68" width="8" height="8" fill="#2563eb"/>
    <rect x="64" y="68" width="8" height="8" fill="#2563eb"/>
    
    <rect x="28" y="80" width="8" height="8" fill="#2563eb"/>
    <rect x="40" y="80" width="8" height="8" fill="#2563eb"/>
    <rect x="52" y="80" width="8" height="8" fill="#2563eb"/>
    <rect x="64" y="80" width="8" height="8" fill="#2563eb"/>
    
    <!-- Door -->
    <rect x="42" y="84" width="12" height="12" fill="#1e40af"/>
    
    <!-- Calculator/Budget symbol -->
    <rect x="4" y="20" width="24" height="32" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="2"/>
    
    <!-- Calculator buttons -->
    <circle cx="10" cy="28" r="2" fill="#2563eb"/>
    <circle cx="16" cy="28" r="2" fill="#2563eb"/>
    <circle cx="22" cy="28" r="2" fill="#2563eb"/>
    
    <circle cx="10" cy="36" r="2" fill="#2563eb"/>
    <circle cx="16" cy="36" r="2" fill="#2563eb"/>
    <circle cx="22" cy="36" r="2" fill="#2563eb"/>
    
    <circle cx="10" cy="44" r="2" fill="#2563eb"/>
    <circle cx="16" cy="44" r="2" fill="#2563eb"/>
    <circle cx="22" cy="44" r="2" fill="#059669"/>
    
    <!-- Money symbol -->
    <text x="84" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">R$</text>
    
    <!-- Chart/Graph lines -->
    <polyline points="84,40 88,36 92,42 96,38" stroke="#ffffff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- App name -->
  <text x="96" y="156" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">ORÇAMENTOS</text>
</svg>